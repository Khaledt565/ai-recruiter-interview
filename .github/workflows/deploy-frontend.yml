name: Build and Deploy Frontend to S3

on:
  push:
    branches:
      - main
    paths:
      - "browser/**"
      - ".github/workflows/deploy-frontend.yml"

env:
  AWS_REGION: eu-central-1
  S3_BUCKET: ai-recruiter-frontend-prod-090605004529-eu
  CLOUDFRONT_DISTRIBUTION_ID: EODHFKLAA35HH

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: browser/package-lock.json

      - name: Install dependencies
        working-directory: browser
        run: npm ci

      - name: Build
        working-directory: browser
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync browser/dist/ s3://${{ env.S3_BUCKET }}/ --delete --region ${{ env.AWS_REGION }}

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
