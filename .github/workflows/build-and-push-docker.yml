name: Build and Push Docker Image to ECR

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/build-and-push-docker.yml"

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: ai-recruiter-backend
  AWS_ACCOUNT_ID: 090605004529

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: latest
        run: docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./backend

      - name: Push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: latest
        run: docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Force Fargate service restart
        env:
          CLUSTER: ai-recruiter-cluster
          SERVICE: ai-recruiter-service
        run: aws ecs update-service --cluster $CLUSTER --service $SERVICE --force-new-deployment --region ${{ env.AWS_REGION }}
