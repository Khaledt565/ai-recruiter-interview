name: Build and Push Docker Image to ECR

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/build-and-push-docker.yml"

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: ai-recruiter-backend
  AWS_ACCOUNT_ID: 090605004529

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: latest
        run: docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./backend

      - name: Push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: latest
        run: docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Force Fargate service restart
        env:
          CLUSTER: ai-recruiter-cluster
          SERVICE: ai-recruiter-service
        run: aws ecs update-service --cluster $CLUSTER --service $SERVICE --force-new-deployment --region ${{ env.AWS_REGION }}

      - name: Wait for new task to be running
        env:
          CLUSTER: ai-recruiter-cluster
          SERVICE: ai-recruiter-service
        run: |
          echo "Waiting for ECS service to stabilize..."
          aws ecs wait services-stable --cluster $CLUSTER --services $SERVICE --region ${{ env.AWS_REGION }}
          echo "Service is stable."

      - name: Update API Gateway with new Fargate IP
        env:
          API_ID: l05uyc9rza
          RESOURCE_ID: 2kgmqr
          CLUSTER: ai-recruiter-cluster
          SERVICE: ai-recruiter-service
        run: |
          # Get the running task ARN
          TASK_ARN=$(aws ecs list-tasks --cluster $CLUSTER --service-name $SERVICE --region ${{ env.AWS_REGION }} --query "taskArns[0]" --output text)
          echo "Task ARN: $TASK_ARN"

          # Get the ENI from the task
          ENI_ID=$(aws ecs describe-tasks --cluster $CLUSTER --tasks $TASK_ARN --region ${{ env.AWS_REGION }} \
            --query "tasks[0].attachments[0].details[?name=='networkInterfaceId'].value" --output text)
          echo "ENI ID: $ENI_ID"

          # Get the public IP
          PUBLIC_IP=$(aws ec2 describe-network-interfaces --network-interface-ids $ENI_ID \
            --region ${{ env.AWS_REGION }} --query "NetworkInterfaces[0].Association.PublicIp" --output text)
          echo "New Fargate public IP: $PUBLIC_IP"

          # Update API Gateway integration URI
          aws apigateway update-integration \
            --rest-api-id $API_ID \
            --resource-id $RESOURCE_ID \
            --http-method ANY \
            --patch-operations "[{\"op\":\"replace\",\"path\":\"/uri\",\"value\":\"http://$PUBLIC_IP:8080/{proxy}\"}]" \
            --region ${{ env.AWS_REGION }}

          # Redeploy API Gateway
          aws apigateway create-deployment --rest-api-id $API_ID --stage-name prod --region ${{ env.AWS_REGION }}
          echo "API Gateway updated to http://$PUBLIC_IP:8080"
