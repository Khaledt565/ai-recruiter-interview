name: Build and Push Docker Image to ECR

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/docker-build.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1
      
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region eu-central-1 | docker login --username AWS --password-stdin 090605004529.dkr.ecr.eu-central-1.amazonaws.com
      
      - name: Build Docker image
        run: |
          docker build -t 090605004529.dkr.ecr.eu-central-1.amazonaws.com/ai-recruiter-backend:latest backend/
          docker tag 090605004529.dkr.ecr.eu-central-1.amazonaws.com/ai-recruiter-backend:latest "090605004529.dkr.ecr.eu-central-1.amazonaws.com/ai-recruiter-backend:${{ github.run_id }}"
      
      - name: Push image to ECR
        run: |
          docker push 090605004529.dkr.ecr.eu-central-1.amazonaws.com/ai-recruiter-backend:latest
          docker push "090605004529.dkr.ecr.eu-central-1.amazonaws.com/ai-recruiter-backend:${{ github.run_id }}"
      
      - name: Output image URI
        run: echo "Image pushed: 090605004529.dkr.ecr.eu-central-1.amazonaws.com/ai-recruiter-backend:latest"
