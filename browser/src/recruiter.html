<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Interview Link - AI Recruiter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        p.subtitle {
            color: #666;
            margin-bottom: 30px;
        }

        label {
            display: block;
            color: #495057;
            font-weight: 500;
            margin-top: 15px;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result h3 {
            color: #28a745;
            margin-bottom: 15px;
        }

        .link-box {
            background: white;
            padding: 15px;
            border-radius: 8px;
            word-break: break-all;
            color: #667eea;
            font-weight: 500;
            margin: 15px 0;
            border: 2px dashed #667eea;
        }

        .copy-btn {
            background: #28a745;
            margin-top: 10px;
        }

        .copy-btn:hover {
            background: #218838;
        }

        .info {
            color: #6c757d;
            font-size: 14px;
            margin-top: 10px;
        }

        .error {
            color: #dc3545;
            margin-top: 15px;
            padding: 10px;
            background: #f8d7da;
            border-radius: 6px;
            display: none;
        }

        .error.show {
            display: block;
        }

        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.2s;
            box-sizing: border-box;
            color: #343a40;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .sessions-section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
            margin-top: 20px;
        }

        .sessions-section h2 {
            margin-bottom: 20px;
            color: #343a40;
            font-size: 20px;
        }

        .sessions-load-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            margin-bottom: 15px;
        }

        .sessions-load-row > div {
            flex: 1;
        }

        .sessions-load-row label {
            margin-bottom: 5px;
            display: block;
        }

        .sessions-load-row input {
            margin-bottom: 0;
        }

        .sessions-load-row button {
            margin-bottom: 0;
            padding: 12px 20px;
            white-space: nowrap;
        }

        .sessions-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .sessions-table th {
            background: #f8f9fa;
            padding: 10px 12px;
            text-align: left;
            font-weight: 600;
            color: #495057;
            border-bottom: 2px solid #dee2e6;
        }

        .sessions-table td {
            padding: 10px 12px;
            border-bottom: 1px solid #f0f0f0;
            color: #343a40;
            vertical-align: middle;
        }

        .sessions-table tr:hover td { background: #f8f9fa; cursor: default; }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-completed { background: #d4edda; color: #155724; }
        .badge-created { background: #d1ecf1; color: #0c5460; }
        .badge-ended { background: #fff3cd; color: #856404; }
        .badge-disconnected { background: #f8d7da; color: #721c24; }
        .rec-strong-yes { color: #155724; font-weight: 600; }
        .rec-yes { color: #0c5460; font-weight: 600; }
        .rec-maybe { color: #856404; font-weight: 600; }
        .rec-no { color: #721c24; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Create Interview Link</h1>
        <p class="subtitle">Generate a unique interview link for your candidate</p>
        
        <form id="createForm">
            <label for="candidateName">Candidate Name *</label>
            <input 
                type="text" 
                id="candidateName" 
                placeholder="John Doe"
                required
            >
            
            <label for="candidateEmail">Candidate Email *</label>
            <input 
                type="email" 
                id="candidateEmail" 
                placeholder="john@example.com"
                required
            >
            
            <label for="recruiterEmail">Your Email *</label>
            <input 
                type="email" 
                id="recruiterEmail" 
                placeholder="recruiter@company.com"
                required
            >

            <label for="jobDescription">Job Description <span style="font-weight:400;color:#6c757d;">(optional — enables AI-tailored questions)</span></label>
            <textarea
                id="jobDescription"
                placeholder="Paste the job description here to generate role-specific interview questions..."
                rows="4"
            ></textarea>
            
            <button type="submit" id="submitBtn">
                Generate Interview Link
            </button>
        </form>

        <div class="error" id="error"></div>
        
        <div class="result" id="result">
            <h3>✅ Interview Link Created!</h3>
            <p><strong>Send this link to the candidate:</strong></p>
            <div class="link-box" id="linkDisplay"></div>
            <button class="copy-btn" onclick="copyLink()">📋 Copy Link</button>
            <p class="info">
                ⏰ Link expires in 7 days<br>
                🔒 Can only be used once<br>
                👤 Personalized for: <span id="candidateNameDisplay"></span>
            </p>
        </div>

        <div class="sessions-section">
            <h2>📋 Past Interviews</h2>
            <div class="sessions-load-row">
                <div>
                    <label for="sessionsEmail">Your Recruiter Email</label>
                    <input type="email" id="sessionsEmail" placeholder="recruiter@company.com">
                </div>
                <button onclick="loadSessions()" id="loadBtn">Load Sessions</button>
            </div>
            <div class="error" id="sessionsError"></div>
            <div id="sessionsContainer" style="display:none;">
                <p id="sessionsCount" style="color:#6c757d;font-size:14px;margin-bottom:10px;"></p>
                <table class="sessions-table">
                    <thead>
                        <tr>
                            <th>Candidate</th>
                            <th>Status</th>
                            <th>Date</th>
                            <th>Score</th>
                            <th>Recommendation</th>
                        </tr>
                    </thead>
                    <tbody id="sessionsBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Dynamic backend URL - localhost for local testing, API Gateway for production via CloudFront
        const backendHost = window.location.hostname === 'localhost' 
            ? 'localhost:8080' 
            : 'l05uyc9rza.execute-api.eu-central-1.amazonaws.com/prod';
        // Production: use HTTPS via API Gateway, Local: use HTTP
        const backendProtocol = window.location.hostname === 'localhost' ? 'http' : 'https';
        const BACKEND_URL = `${backendProtocol}://${backendHost}`;
        let generatedLink = '';

        document.getElementById('createForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const errorDiv = document.getElementById('error');
            const resultDiv = document.getElementById('result');
            
            errorDiv.classList.remove('show');
            resultDiv.classList.remove('show');
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating link...';
            
            const data = {
                candidateName: document.getElementById('candidateName').value,
                candidateEmail: document.getElementById('candidateEmail').value,
                recruiterEmail: document.getElementById('recruiterEmail').value,
                jobDescription: document.getElementById('jobDescription').value.trim() || undefined,
            };
            
            try {
                const response = await fetch(`${BACKEND_URL}/interview/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data),
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Failed to create link');
                }
                
                const result = await response.json();
                
                generatedLink = result.interviewLink;
                document.getElementById('linkDisplay').textContent = generatedLink;
                document.getElementById('candidateNameDisplay').textContent = data.candidateName;
                resultDiv.classList.add('show');
                
                // Pre-fill recruiter email in the sessions panel
                document.getElementById('sessionsEmail').value = data.recruiterEmail;
                document.getElementById('createForm').reset();
                
                console.log('Interview link created:', result);
                
            } catch (error) {
                console.error('Error:', error);
                errorDiv.textContent = `❌ Error: ${error.message}`;
                errorDiv.classList.add('show');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Generate Interview Link';
            }
        });
        
        async function loadSessions() {
            const emailInput = document.getElementById('sessionsEmail');
            const loadBtn = document.getElementById('loadBtn');
            const errDiv = document.getElementById('sessionsError');
            const container = document.getElementById('sessionsContainer');
            const tbody = document.getElementById('sessionsBody');
            const count = document.getElementById('sessionsCount');

            errDiv.classList.remove('show');
            container.style.display = 'none';

            const email = emailInput.value.trim();
            if (!email) {
                errDiv.textContent = '❌ Please enter your recruiter email.';
                errDiv.classList.add('show');
                return;
            }

            loadBtn.disabled = true;
            loadBtn.textContent = 'Loading...';
            try {
                const res = await fetch(`${BACKEND_URL}/interview/sessions?recruiterEmail=${encodeURIComponent(email)}`);
                if (!res.ok) throw new Error('Failed to load sessions');
                const data = await res.json();
                const sessions = data.sessions || [];

                count.textContent = `${sessions.length} interview${sessions.length !== 1 ? 's' : ''} found`;
                tbody.innerHTML = '';

                if (sessions.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#6c757d;padding:20px;">No interviews found for this email.</td></tr>';
                } else {
                    sessions.forEach(s => {
                        const date = s.createdAt
                            ? new Date(s.createdAt).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' })
                            : '—';
                        const recClass = getRecClass(s.recommendation);
                        const score = s.score != null ? `${s.score}/10` : '—';
                        const rec = s.recommendation || '—';
                        const titleAttr = s.summary ? ` title="${escapeHtml(s.summary)}"` : '';
                        tbody.innerHTML += `<tr${titleAttr}>
                            <td><strong>${escapeHtml(s.candidateName || '—')}</strong><br><span style="color:#6c757d;font-size:12px;">${escapeHtml(s.candidateEmail || '')}</span></td>
                            <td>${getStatusBadge(s.status || 'unknown')}</td>
                            <td>${date}</td>
                            <td style="text-align:center;">${score}</td>
                            <td class="${recClass}">${rec}</td>
                        </tr>`;
                    });
                }
                container.style.display = 'block';
            } catch (err) {
                errDiv.textContent = `❌ Error: ${err.message}`;
                errDiv.classList.add('show');
            } finally {
                loadBtn.disabled = false;
                loadBtn.textContent = 'Load Sessions';
            }
        }

        function getStatusBadge(status) {
            if (status === 'completed') return '<span class="badge badge-completed">Completed</span>';
            if (status === 'created') return '<span class="badge badge-created">Not Started</span>';
            if (status && status.includes('ended')) return '<span class="badge badge-ended">Ended Early</span>';
            if (status === 'disconnected') return '<span class="badge badge-disconnected">Disconnected</span>';
            return `<span class="badge" style="background:#e9ecef;color:#495057;">${escapeHtml(status)}</span>`;
        }

        function getRecClass(rec) {
            if (rec === 'Strong Yes') return 'rec-strong-yes';
            if (rec === 'Yes') return 'rec-yes';
            if (rec === 'Maybe') return 'rec-maybe';
            if (rec === 'No') return 'rec-no';
            return '';
        }

        function escapeHtml(str) {
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function copyLink() {
            if (!generatedLink) {
                alert('No link to copy!');
                return;
            }
            
            navigator.clipboard.writeText(generatedLink).then(() => {
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = '✅ Copied!';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            }).catch(err => {
                console.error('Copy failed:', err);
                alert('Failed to copy link. Please copy manually.');
            });
        }
    </script>
</body>
</html>
