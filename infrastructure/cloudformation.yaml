AWSTemplateFormatVersion: "2010-09-09"
Description: "AI Recruiter Interview - Complete Infrastructure"

Parameters:
  EnvironmentName:
    Type: String
    Default: "dev"
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Environment name (dev, staging, or prod)

Resources:
  # ===================================
  # DynamoDB Table for Session State
  # ===================================
  InterviewSessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "InterviewSessions-${EnvironmentName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  # ===================================
  # Cognito Identity Pool for Browser Transcribe
  # ===================================
  TranscribeIdentityPool:
    Type: AWS::Cognito::IdentityPool
    Properties:
      IdentityPoolName: !Sub "InterviewTranscribe-${EnvironmentName}"
      AllowUnauthenticatedIdentities: true

  # IAM Role for Unauthenticated Cognito Users
  CognitoUnauthRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "Cognito_InterviewTranscribe_Unauth_Role-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: cognito-identity.amazonaws.com
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                cognito-identity.amazonaws.com:aud: !Ref TranscribeIdentityPool
      ManagedPolicyArns:
        - !Ref TranscribePolicy

  # Policy for Transcribe Access
  TranscribePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "TranscribeStreamingPolicy-${EnvironmentName}"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - transcribe:StartStreamTranscription
              - transcribe:StartStreamTranscriptionWebSocket
            Resource: "*"

  # Attach Cognito Role to Identity Pool
  IdentityPoolRoleAttachment:
    Type: AWS::Cognito::IdentityPoolRoleAttachment
    Properties:
      IdentityPoolId: !Ref TranscribeIdentityPool
      Roles:
        unauthenticated: !GetAtt CognitoUnauthRole.Arn

  # ===================================
  # ECR Repository for Docker Images
  # ===================================
  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "ai-recruiter-interview-${EnvironmentName}"
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 5 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 5
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  # ===================================
  # ECS Cluster
  # ===================================
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "ai-recruiter-cluster-${EnvironmentName}"
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  # CloudWatch Log Group
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/ai-recruiter-interview-${EnvironmentName}"
      RetentionInDays: 7

  # ===================================
  # IAM Roles for ECS
  # ===================================
  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "ecsTaskExecutionRole-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "ecsTaskRole-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: TaskPermissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:Query
                Resource: !GetAtt InterviewSessionsTable.Arn
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource: "*"
              - Effect: Allow
                Action:
                  - polly:SynthesizeSpeech
                Resource: "*"
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource:
                  - !GetAtt EmailRetryQueue.Arn
                  - !GetAtt ScoringRetryQueue.Arn
                  - !GetAtt ReportRetryQueue.Arn

  # ===================================
  # SQS Queues for async retries
  # ===================================

  # Dead-letter queues (messages that fail repeatedly land here for inspection)
  EmailRetryDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "ai-recruiter-email-retry-dlq-${EnvironmentName}"
      MessageRetentionPeriod: 1209600  # 14 days
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  ScoringRetryDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "ai-recruiter-scoring-retry-dlq-${EnvironmentName}"
      MessageRetentionPeriod: 1209600  # 14 days
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  # Main retry queues
  EmailRetryQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "ai-recruiter-email-retry-${EnvironmentName}"
      MessageRetentionPeriod: 86400  # 1 day
      VisibilityTimeout: 60
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt EmailRetryDLQ.Arn
        maxReceiveCount: 3
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  ScoringRetryQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "ai-recruiter-scoring-retry-${EnvironmentName}"
      MessageRetentionPeriod: 86400  # 1 day
      VisibilityTimeout: 60
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ScoringRetryDLQ.Arn
        maxReceiveCount: 3
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  ReportRetryDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "ai-recruiter-report-retry-dlq-${EnvironmentName}"
      MessageRetentionPeriod: 1209600  # 14 days
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  ReportRetryQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "ai-recruiter-report-retry-${EnvironmentName}"
      MessageRetentionPeriod: 86400  # 1 day
      VisibilityTimeout: 60
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ReportRetryDLQ.Arn
        maxReceiveCount: 3
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  # ===================================
  # Security Group
  # ===================================
  FargateSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "ai-recruiter-fargate-sg-${EnvironmentName}"
      GroupDescription: Security group for AI recruiter Fargate service
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  # ===================================
  # VPC (using default or create new)
  # ===================================
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub "ai-recruiter-vpc-${EnvironmentName}"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "ai-recruiter-igw-${EnvironmentName}"

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "ai-recruiter-public-subnet-1-${EnvironmentName}"

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "ai-recruiter-public-subnet-2-${EnvironmentName}"

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "ai-recruiter-public-rt-${EnvironmentName}"

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  SubnetRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # ===================================
  # ECS Task Definition
  # ===================================
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "ai-recruiter-interview-${EnvironmentName}"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: "512"
      Memory: "1024"
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      ContainerDefinitions:
        - Name: interview-server
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRRepository}:latest"
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          Environment:
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: SESSION_TABLE
              Value: !Ref InterviewSessionsTable
            - Name: BEDROCK_MODEL_ID
              Value: anthropic.claude-3-haiku-20240307-v1:0
            - Name: SQS_EMAIL_RETRY_QUEUE_URL
              Value: !Ref EmailRetryQueue
            - Name: SQS_SCORING_RETRY_QUEUE_URL
              Value: !Ref ScoringRetryQueue
            - Name: SQS_REPORT_RETRY_QUEUE_URL
              Value: !Ref ReportRetryQueue
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  # ===================================
  # ECS Service
  # ===================================
  ECSService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "ai-recruiter-service-${EnvironmentName}"
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !Ref PublicSubnet1
            - !Ref PublicSubnet2
          SecurityGroups:
            - !Ref FargateSecurityGroup

  # ===================================
  # S3 Bucket for Frontend
  # ===================================
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "ai-recruiter-frontend-${EnvironmentName}-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyText:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: "s3:GetObject"
            Resource: !Sub "${FrontendBucket.Arn}/*"

  # ===================================
  # CloudFront Distribution
  # ===================================
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Comment: !Sub "AI Recruiter Frontend - ${EnvironmentName}"
        DefaultCacheBehavior:
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          TargetOriginId: S3Origin
          Compress: true
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig: {}
        PriceClass: PriceClass_100
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

# ===================================
# Outputs
# ===================================
Outputs:
  CognitoIdentityPoolId:
    Description: Cognito Identity Pool ID for browser app
    Value: !Ref TranscribeIdentityPool
    Export:
      Name: !Sub "${AWS::StackName}-CognitoIdentityPoolId"

  ECRRepositoryUri:
    Description: ECR Repository URI for Docker images
    Value: !GetAtt ECRRepository.RepositoryUri
    Export:
      Name: !Sub "${AWS::StackName}-ECRRepositoryUri"

  DynamoDBTableName:
    Description: DynamoDB table name
    Value: !Ref InterviewSessionsTable
    Export:
      Name: !Sub "${AWS::StackName}-DynamoDBTableName"

  ECSClusterName:
    Description: ECS Cluster name
    Value: !Ref ECSCluster
    Export:
      Name: !Sub "${AWS::StackName}-ECSClusterName"

  ECSServiceName:
    Description: ECS Service name
    Value: !GetAtt ECSService.Name
    Export:
      Name: !Sub "${AWS::StackName}-ECSServiceName"

  Region:
    Description: AWS Region
    Value: !Ref AWS::Region

  DeploymentInstructions:
    Description: Next steps for deployment
    Value: !Sub |
      1. Build and push Docker image:
         aws ecr get-login-password --region ${AWS::Region} | docker login --username AWS --password-stdin ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com
         docker build -t ai-recruiter-interview .
         docker tag ai-recruiter-interview:latest ${ECRRepository.RepositoryUri}:latest
         docker push ${ECRRepository.RepositoryUri}:latest

      2. Update browser config with:
         - Cognito Pool ID: ${TranscribeIdentityPool}
         - Region: ${AWS::Region}
         - Backend URL: Check ECS task public IP

      3. Force service update:
         aws ecs update-service --cluster ${ECSCluster} --service ${ECSService.Name} --force-new-deployment

  FrontendBucketName:
    Description: S3 bucket for frontend files
    Value: !Ref FrontendBucket
    Export:
      Name: !Sub "${AWS::StackName}-FrontendBucket"

  CloudFrontUrl:
    Description: CloudFront distribution URL for frontend
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"
    Export:
      Name: !Sub "${AWS::StackName}-CloudFrontUrl"

  CloudFrontDistributionId:
    Description: CloudFront distribution ID
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Sub "${AWS::StackName}-CloudFrontDistributionId"

  EmailRetryQueueUrl:
    Description: SQS queue URL for failed SES email retries
    Value: !Ref EmailRetryQueue
    Export:
      Name: !Sub "${AWS::StackName}-EmailRetryQueueUrl"

  ScoringRetryQueueUrl:
    Description: SQS queue URL for failed AI scoring retries
    Value: !Ref ScoringRetryQueue
    Export:
      Name: !Sub "${AWS::StackName}-ScoringRetryQueueUrl"

  ReportRetryQueueUrl:
    Description: SQS queue URL for failed interview report generation retries
    Value: !Ref ReportRetryQueue
    Export:
      Name: !Sub "${AWS::StackName}-ReportRetryQueueUrl"
